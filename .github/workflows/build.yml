name: Build-Savage-Blue-Final-2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          brew install ldid dpkg make

      - name: Install Theos & SDK
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks-tmp
          mv $THEOS/sdks-tmp/iPhoneOS14.5.sdk $THEOS/sdks/
          rm -rf $THEOS/sdks-tmp

      - name: Fix Missing Plist & Prepare Build
        run: |
          if [ ! -f "SavageBlue2026.plist" ]; then
            cat <<EOF > SavageBlue2026.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>Filter</key>
            <dict>
              <key>Bundles</key>
              <array>
                <string>com.dts.freefireth</string>
                <string>com.dts.freefiremax</string>
              </array>
            </dict>
          </dict>
          </plist>
          EOF
          fi

      - name: Build Dylib Only
        run: |
          export THEOS=~/theos
          # Chỉ chạy make để tạo dylib, không đóng gói thành deb
          make FINALPACKAGE=1 SDKVERSION=14.5
          
          # Tạo thư mục đầu ra và gom file dylib vào
          mkdir -p out_dylib
          find .theos/obj/ -name "*.dylib" -exec cp {} out_dylib/ \;

      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Savage-Blue-Dylib-Hang-Nong
          path: out_dylib/*.dylib

